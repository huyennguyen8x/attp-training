<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ATTP Training System</title>
<style>
:root{
  --navy:#1a2e4a;--navy2:#243d5e;--teal:#0d7c86;--teal2:#0a6870;
  --teal-lt:#e5f4f5;--teal-md:#b0dde0;
  --green:#1a7a46;--green-lt:#e6f4ed;
  --red:#c0392b;--red-lt:#fdecea;
  --amber:#b5670a;--amber-lt:#fef3e0;
  --purple:#5c35b8;--purple-lt:#ede8fc;
  --gray0:#f6f7f9;--gray1:#edf0f3;--gray2:#d0d7e0;
  --gray3:#8a96a3;--gray4:#4a5568;--text:#1a2332;
  --white:#fff;--radius:10px;--shadow:0 2px 14px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--gray0);color:var(--text);min-height:100vh;font-size:15px;}

/* NAV */
.nav{background:var(--navy);height:52px;display:flex;align-items:stretch;position:sticky;top:0;z-index:200;overflow-x:auto;}
.nav-brand{color:#fff;font-size:14px;font-weight:700;padding:0 16px;display:flex;align-items:center;gap:8px;white-space:nowrap;border-right:1px solid rgba(255,255,255,.12);flex-shrink:0;}
.nav-brand .qa-badge{background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.05em;}
.nav-tabs{display:flex;flex:1;}
.nav-tab{color:rgba(255,255,255,.6);background:none;border:none;border-bottom:3px solid transparent;padding:0 16px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit;}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.06);}
.nav-tab.active{color:#fff;border-bottom-color:var(--teal);}
.nav-tab.hidden{display:none;}

/* VIEWS */
.view{display:none;max-width:720px;margin:0 auto;padding:20px 16px 60px;}
.view.active{display:block;}
.view-wide{max-width:100%;padding:20px 20px 60px;}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
.card-head{background:var(--navy);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.card-head h3{color:#fff;font-size:14px;font-weight:600;}
.card-body{padding:20px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal2);}
.btn-primary:disabled{background:var(--gray2);color:var(--gray3);cursor:not-allowed;}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-ghost{background:transparent;color:var(--gray4);border:1.5px solid var(--gray2);}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px;}
.btn-lg{padding:14px 20px;font-size:16px;width:100%;justify-content:center;}

/* FORM */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--gray2);border-radius:8px;font-size:15px;color:var(--text);background:var(--gray0);font-family:inherit;transition:border .15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);background:#fff;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-note{font-size:11px;color:var(--gray3);margin-top:4px;}
.input-big{width:100%;padding:16px;border:2px solid var(--gray2);border-radius:10px;font-size:22px;font-weight:700;text-align:center;letter-spacing:.12em;font-family:inherit;color:var(--navy);transition:border .15s;}
.input-big:focus{outline:none;border-color:var(--teal);}

/* ALERTS */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:12px;line-height:1.5;}
.alert-error{background:var(--red-lt);color:var(--red);border:1px solid #f4b8b3;}
.alert-success{background:var(--green-lt);color:var(--green);border:1px solid #9dd8b8;}
.alert-warning{background:var(--amber-lt);color:var(--amber);border:1px solid #f5c876;}
.alert-info{background:var(--teal-lt);color:var(--teal);border:1px solid var(--teal-md);}

/* BADGE */
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:5px;font-weight:700;}
.badge-green{background:var(--green-lt);color:var(--green);}
.badge-red{background:var(--red-lt);color:var(--red);}
.badge-amber{background:var(--amber-lt);color:var(--amber);}
.badge-gray{background:var(--gray1);color:var(--gray3);}
.badge-teal{background:var(--teal-lt);color:var(--teal);}
.badge-purple{background:var(--purple-lt);color:var(--purple);}

/* STATS BAR */
.stats-bar{background:var(--navy);border-radius:var(--radius);padding:14px 20px;display:flex;gap:0;margin-bottom:16px;}
.stat{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.1);padding:6px 8px;}
.stat:last-child{border-right:none;}
.stat-val{font-size:24px;font-weight:800;color:#fff;line-height:1;}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

/* TABLE */
.table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px;}
thead tr{background:var(--navy);}
th{padding:10px 13px;text-align:left;color:rgba(255,255,255,.8);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
td{padding:10px 13px;border-bottom:1px solid var(--gray1);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--gray0);}

/* SUCCESS SCREEN */
.success-screen{text-align:center;padding:36px 20px;}
.success-icon{font-size:60px;margin-bottom:14px;}
.success-title{font-size:22px;font-weight:800;margin-bottom:8px;}
.success-detail{font-size:14px;color:var(--gray4);margin-bottom:24px;line-height:1.7;}

/* QUIZ */
.quiz-wrap{max-width:680px;margin:0 auto;}
.quiz-header{background:var(--white);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.quiz-timer{font-size:22px;font-weight:800;color:var(--teal);font-variant-numeric:tabular-nums;}
.quiz-timer.warning{color:var(--red);}
.progress-wrap{height:5px;background:var(--gray1);border-radius:99px;margin-bottom:18px;overflow:hidden;}
.progress-bar{height:100%;background:var(--teal);border-radius:99px;transition:width .3s;}
.q-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:14px;}
.q-label{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.q-text{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:18px;line-height:1.55;}
.opt-btn{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;border-radius:9px;border:2px solid var(--gray2);margin-bottom:9px;cursor:pointer;transition:all .15s;background:#fff;text-align:left;font-family:inherit;font-size:14px;color:var(--text);}
.opt-btn:hover:not(:disabled){border-color:var(--teal);background:var(--teal-lt);}
.opt-btn.selected{border-color:var(--teal);background:var(--teal-lt);}
.opt-btn.correct{border-color:var(--green);background:var(--green-lt);}
.opt-btn.wrong{border-color:var(--red);background:var(--red-lt);}
.opt-btn:disabled{cursor:default;}
.opt-letter{width:30px;height:30px;border-radius:7px;background:var(--gray1);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:var(--gray4);}
.opt-btn.selected .opt-letter{background:var(--teal);color:#fff;}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
.opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.q-nav-dots{display:flex;gap:4px;flex-wrap:wrap;max-width:360px;}
.q-dot{width:12px;height:12px;border-radius:50%;background:var(--gray2);border:none;cursor:pointer;transition:all .15s;padding:0;}
.q-dot.answered{background:var(--teal);}
.q-dot.current{background:var(--amber);transform:scale(1.3);}

/* RESULT */
.result-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 22px;text-align:center;}
.score-ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;border:4px solid;}
.score-ring.pass{border-color:var(--green);background:var(--green-lt);}
.score-ring.fail{border-color:var(--red);background:var(--red-lt);}
.score-pct{font-size:28px;font-weight:900;line-height:1;}
.score-pct.pass{color:var(--green);}
.score-pct.fail{color:var(--red);}
.verdict{font-size:22px;font-weight:800;margin-bottom:6px;}
.verdict.pass{color:var(--green);}
.verdict.fail{color:var(--red);}
.breakdown{border-top:1px solid var(--gray1);padding-top:16px;margin-top:16px;text-align:left;}
.b-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--gray1);font-size:13px;line-height:1.5;}
.b-row:last-child{border-bottom:none;}

/* DASHBOARD */
.filter-bar{background:var(--white);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);}
.lock-badge{font-size:12px;padding:4px 11px;border-radius:6px;font-weight:600;}
.lock-badge.open{background:var(--green-lt);color:var(--green);}
.lock-badge.closed{background:var(--red-lt);color:var(--red);}
.random-box{background:var(--purple-lt);border:2px solid var(--purple);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.random-names{flex:1;}
.random-title{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.random-list{font-size:14px;font-weight:600;color:var(--purple);line-height:1.8;}

/* ADMIN */
.admin-section{margin-bottom:22px;}
.admin-section h4{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--gray1);}
.q-editor-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--gray2);margin-bottom:10px;overflow:hidden;}
.q-editor-head{background:var(--navy2);padding:10px 14px;display:flex;align-items:flex-start;gap:10px;}
.q-num-badge{background:var(--teal);color:#fff;font-size:11px;font-weight:700;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.q-editor-head textarea{flex:1;background:transparent;border:none;color:#fff;font-size:14px;font-weight:500;font-family:inherit;resize:none;outline:none;line-height:1.4;min-height:36px;}
.q-editor-head textarea::placeholder{color:rgba(255,255,255,.35);}
.q-editor-body{padding:12px 14px;}
.opt-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.opt-ltr-edit{width:28px;height:28px;border-radius:6px;background:var(--gray1);color:var(--gray4);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.opt-ltr-edit.correct{background:var(--green-lt);color:var(--green);border-color:var(--green);}
.opt-edit-input{flex:1;padding:7px 10px;border:1.5px solid var(--gray2);border-radius:7px;font-size:13px;font-family:inherit;}
.opt-edit-input:focus{outline:none;border-color:var(--teal);}
.add-q-btn{width:100%;padding:13px;border:2px dashed var(--gray2);background:transparent;border-radius:var(--radius);color:var(--gray3);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.add-q-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt);}

/* SETUP BANNER */
.setup-banner{background:var(--amber-lt);border:2px solid var(--amber);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;}
.setup-banner h3{color:var(--amber);font-size:15px;margin-bottom:8px;}
.setup-banner p{font-size:13px;color:var(--gray4);line-height:1.6;margin-bottom:4px;}
.setup-banner code{background:rgba(0,0,0,.07);padding:1px 6px;border-radius:4px;font-size:12px;}

/* SPINNER */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:40px;color:var(--gray3);font-size:14px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;transition:all .3s;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-bg.hidden{display:none;}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--navy);}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* OFFLINE INDICATOR */
.offline-bar{background:var(--amber);color:#fff;text-align:center;padding:7px;font-size:12px;font-weight:600;display:none;}
.offline-bar.show{display:block;}

@media(max-width:480px){
  .field-row{grid-template-columns:1fr;}
  .stats-bar{flex-wrap:wrap;}
  .stat{min-width:50%;}
  .stat-val{font-size:20px;}
  .q-nav-dots{display:none;}
}
</style>
</head>
<body>

<!-- OFFLINE BAR -->
<div class="offline-bar" id="offline-bar">⚠ Đang offline — dữ liệu sẽ tự đồng bộ khi có mạng</div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">
    <span style="font-size:18px">🛡️</span> ATTP
    <span class="qa-badge" id="qa-badge" style="display:none">QA</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-checkin" onclick="gotoTab('checkin')">✅ Check-in</button>
    <button class="nav-tab" id="tab-quiz" onclick="gotoTab('quiz')">📝 Bài Test</button>
    <button class="nav-tab hidden" id="tab-dashboard" onclick="gotoTab('dashboard')">📊 Dashboard</button>
    <button class="nav-tab hidden" id="tab-admin" onclick="gotoTab('admin')">⚙️ Quản lý</button>
    <button class="nav-tab" id="tab-qa-login" onclick="gotoTab('qa-login')" style="margin-left:auto;color:rgba(255,255,255,.4);">🔐 QA</button>
  </div>
</nav>

<!-- ── VIEWS ─────────────────────────────────────────────── -->

<!-- CHECKIN -->
<div id="view-checkin" class="view active">
  <div id="checkin-content"></div>
</div>

<!-- QUIZ -->
<div id="view-quiz" class="view">
  <div id="quiz-content"></div>
</div>

<!-- DASHBOARD -->
<div id="view-dashboard" class="view view-wide">
  <div id="dashboard-content"></div>
</div>

<!-- ADMIN -->
<div id="view-admin" class="view">
  <div id="admin-content"></div>
</div>

<!-- QA LOGIN -->
<div id="view-qa-login" class="view">
  <div class="card" style="max-width:400px;margin:40px auto;">
    <div class="card-head"><h3>🔐 Đăng nhập QA</h3></div>
    <div class="card-body">
      <div class="field">
        <label>Mật khẩu QA</label>
        <input type="password" id="qa-pw-input" placeholder="Nhập mật khẩu..." onkeydown="if(event.key==='Enter')doQALogin()">
      </div>
      <div id="qa-login-error" class="alert alert-error" style="display:none"></div>
      <button class="btn btn-primary btn-lg" onclick="doQALogin()">Đăng nhập</button>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg hidden" id="modal-walkin">
  <div class="modal">
    <h3>📝 Đăng ký Walk-in</h3>
    <p style="font-size:13px;color:var(--gray3);margin-bottom:16px">Mã NV <strong id="walkin-code-display"></strong> không có trong danh sách đăng ký.</p>
    <div class="field">
      <label>Họ và tên *</label>
      <input type="text" id="wi-hoten" placeholder="Nguyễn Văn A">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Store *</label>
        <select id="wi-store" onchange="wiStoreChange()">
          <option value="">-- Chọn store --</option>
          <option>LB</option><option>TB</option><option>SYR</option>
          <option>BT</option><option>TD</option><option>PMH</option><option>VC</option><option>CR</option><option>Depot HAN</option><option>Depot HCM</option>
        </select>
      </div>
      <div class="field">
        <label>Location</label>
        <input type="text" id="wi-location" placeholder="Tự động" readonly style="background:var(--gray1);">
      </div>
    </div>
    <div class="field">
      <label>Bộ phận / Dept</label>
      <input type="text" id="wi-dept" placeholder="Kitchen, Lounge, Stock...">
    </div>
    <div id="wi-error" class="alert alert-error" style="display:none"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-walkin')">Huỷ</button>
      <button class="btn btn-primary" onclick="submitWalkIn()">Xác nhận Walk-in</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modal-approve-retake">
  <div class="modal">
    <h3>✅ Phê duyệt làm lại</h3>
    <p style="font-size:13px;color:var(--gray4);margin-bottom:16px">Phê duyệt cho <strong id="retake-nv-name"></strong> làm bài kiểm tra lại.</p>
    <div class="field">
      <label>Ghi chú (tuỳ chọn)</label>
      <input type="text" id="retake-note" placeholder="VD: Vắng có lý do, đến muộn...">
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-approve-retake')">Huỷ</button>
      <button class="btn btn-success" onclick="submitApproveRetake()">Phê duyệt</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modal-create-session">
  <div class="modal">
    <h3>➕ Tạo phiên đào tạo mới</h3>
    <div class="field">
      <label>Tên phiên *</label>
      <input type="text" id="ns-name" placeholder="VD: ATTP HCM Đợt 1 2025">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Ngày *</label>
        <input type="text" id="ns-date" placeholder="28/06/2025">
      </div>
      <div class="field">
        <label>Giờ bắt đầu</label>
        <input type="text" id="ns-start" value="08:20">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-create-session')">Huỷ</button>
      <button class="btn btn-primary" onclick="submitCreateSession()">Tạo phiên</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// CẤU HÌNH — THAY GAS_URL SAU KHI DEPLOY APPS SCRIPT
// ══════════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzyAhaaHb-8BKA_u51hF4zmFkv7488yiq3N4KV8-fnOFQaFJFCUFWkiLM18zgEw70B0hw/exec';
const LETTERS = ['A','B','C','D'];
const HN_STORES = ['LB','TB','SYR'];

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let appState = {
  qaPassword: null,
  isQA: false,
  currentSession: null,
  sessionStatus: {checkinOpen:true, quizOpen:false},
  dashboardData: null,
  questions: [],
  quizAnswers: {},
  quizSubmitted: false,
  timerInt: null,
  timeLeft: 0,
  currentQ: 0,
  quizMaNV: null,

// API CALLS

// Gọi GAS qua JSONP để bypass CORS hoàn toàn
function gasCall(params) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      reject(new Error('Timeout'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      resolve(data);
    };
    const url = GAS_URL + '?' + new URLSearchParams({...params, callback: cbName});
    const script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
      reject(new Error('Script load error'));
    };
    document.head.appendChild(script);
  });
}
async function gasGet(params) {
  return gasCall(params);
}
async function gasPost(body) {
  return gasCall({payload: JSON.stringify(body)});
}

// Offline queue: lưu checkin khi mất mạng
function saveOffline(item) {
  appState.offlineQueue.push({...item, _queuedAt: Date.now()});
  localStorage.setItem('attp_offline', JSON.stringify(appState.offlineQueue));
}
async function syncOfflineQueue() {
  if (!appState.offlineQueue.length) return;
  const remaining = [];
  for (const item of appState.offlineQueue) {
    try {
      const res = await gasPost(item);
      if (!res.ok && !res.alreadyCheckedIn) remaining.push(item);
    } catch { remaining.push(item); }
  }
  appState.offlineQueue = remaining;
  localStorage.setItem('attp_offline', JSON.stringify(remaining));
  if (!remaining.length) showToast('✅ Đã đồng bộ '+( appState.offlineQueue.length)+' checkin offline');
}

// Monitor mạng
window.addEventListener('online', () => { document.getElementById('offline-bar').classList.remove('show'); syncOfflineQueue(); });

async function doCheckin() {
  if (!appState.sessionStatus.checkinOpen) { showError('ci-error','Checkin đã đóng. Liên hệ QA in-charge.'); return; }
  const code = document.getElementById('ci-code').value.trim().toUpperCase();
  if (!code) { showError('ci-error','Vui lòng nhập mã nhân viên.'); return; }
  const sessionId = appState.currentSession?.['Session ID'];
  if (!sessionId) { showError('ci-error','Chưa có phiên đào tạo. Liên hệ QA.'); return; }

  const btn = document.getElementById('ci-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

  const body = {action:'checkin', maNV:code, sessionId, hoTen:'', store:'', dept:'', isWalkIn:false};

  try {
    let res;
    if (!navigator.onLine) {
      // Offline: check danh sách local nếu có
      saveOffline(body);
      showCheckinSuccess({maNV:code, hoTen:code, store:'', dept:'', location:'', time:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}), isWalkIn:false, _offline:true});
      return;
    }
    res = await gasPost(body);
    if (res.ok) { showCheckinSuccess(res); return; }
    if (res.alreadyCheckedIn) { showError('ci-error', `Mã ${code} đã điểm danh rồi. Liên hệ QA nếu cần hỗ trợ.`); btn.disabled=false; btn.textContent='Xác nhận điểm danh'; return; }
    // Walk-in
    if (!res.found) {
      appState.pendingWalkIn = {maNV:code, sessionId};
      document.getElementById('walkin-code-display').textContent = code;
      document.getElementById('modal-walkin').classList.remove('hidden');
      btn.disabled=false; btn.textContent='Xác nhận điểm danh';
      return;
    }
    showError('ci-error', res.error || 'Có lỗi xảy ra.');
  } catch(e) {
    saveOffline(body);
    showCheckinSuccess({maNV:code, hoTen:code, store:'', dept:'', location:'', time:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}), isWalkIn:false, _offline:true});

  }
}

async function startQuiz() {
  const code = document.getElementById('quiz-code')?.value.trim().toUpperCase();
  if (!code) { showError('quiz-error','Vui lòng nhập mã nhân viên.'); return; }
  const sessionId = appState.currentSession?.['Session ID'];
  const btn = document.querySelector('#view-quiz .btn-primary');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Đang tải...'; }
  try {
    const res = await gasGet({action:'getQuestions', maNV:code, sessionId});
    if (!res.ok) {
      if (res.alreadySubmitted) { renderQuizResult(res.result, code, true); return; }
      showError('quiz-error', res.error || 'Có lỗi xảy ra.');
      if (btn) { btn.disabled=false; btn.textContent='Bắt đầu làm bài →'; }
      return;
    }
    appState.questions = res.questions;
    appState.quizAnswers = {};
    appState.quizSubmitted = false;
    appState.quizMaNV = code;
    appState.quizAttempt = res.attempt;
    appState.currentQ = 0;
    appState.timeLeft = (res.totalMinutes || 45) * 60;
    clearInterval(appState.timerInt);
    appState.timerInt = setInterval(tickTimer, 1000);
    renderQuizQuestion();
  } catch(e) {
    showError('quiz-error','Lỗi kết nối. Vui lòng thử lại.');
    if (btn) { btn.disabled=false; btn.textContent='Bắt đầu làm bài →'; }
  }
}

function tickTimer() {
  appState.timeLeft--;
  const el = document.getElementById('quiz-timer');
  if (el) {
    el.textContent = '⏱ ' + fmtTime(appState.timeLeft);
    if (appState.timeLeft <= 300) el.classList.add('warning');
  }
  if (appState.timeLeft <= 0) { clearInterval(appState.timerInt); submitQuiz(true); }
}

function fmtTime(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function renderQuizQuestion() {
  const q = appState.questions[appState.currentQ];
  const total = appState.questions.length;
  const answered = Object.keys(appState.quizAnswers).length;
  const el = document.getElementById('quiz-content');
  el.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-header">
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--navy)">${appState.quizMaNV}</div>
          <div style="font-size:12px;color:var(--gray3)">Đã trả lời ${answered}/${total} câu</div>
        </div>
        <div class="quiz-timer" id="quiz-timer">⏱ ${fmtTime(appState.timeLeft)}</div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${Math.round(appState.currentQ/total*100)}%"></div></div>
      <div class="q-card">
        <div class="q-label">Câu ${appState.currentQ+1} / ${total}</div>
        <div class="q-text">${q.text}</div>
        ${q.options.map((opt,oi)=>`
          <button class="opt-btn ${appState.quizAnswers[appState.currentQ]===oi?'selected':''}"
            onclick="selectAns(${appState.currentQ},${oi})">
            <div class="opt-letter">${LETTERS[oi]}</div>
            <span>${opt||'(trống)'}</span>
          </button>`).join('')}
      </div>
      <div class="quiz-nav">
        <button class="btn btn-ghost btn-sm" onclick="qPrev()" ${appState.currentQ===0?'style="visibility:hidden"':''}>← Trước</button>
        <div class="q-nav-dots">${appState.questions.map((_,i)=>`
          <button class="q-dot ${appState.quizAnswers[i]!==undefined?'answered':''} ${i===appState.currentQ?'current':''}"
            onclick="jumpQ(${i})" title="Câu ${i+1}"></button>`).join('')}</div>
        ${appState.currentQ<total-1
          ? `<button class="btn btn-primary btn-sm" onclick="qNext()">Tiếp →</button>`
          : `<button class="btn btn-success btn-sm" onclick="confirmSubmit()">✓ Nộp bài</button>`}
      </div>
    </div>`;
}

function selectAns(qi,oi){ appState.quizAnswers[qi]=oi; renderQuizQuestion(); }
function qNext(){ if(appState.currentQ<appState.questions.length-1){appState.currentQ++;renderQuizQuestion();} }
function qPrev(){ if(appState.currentQ>0){appState.currentQ--;renderQuizQuestion();} }
function jumpQ(i){ appState.currentQ=i; renderQuizQuestion(); }

function confirmSubmit() {
  const unanswered = appState.questions.length - Object.keys(appState.quizAnswers).length;
  if (unanswered > 0 && !confirm(`Còn ${unanswered} câu chưa trả lời. Bạn có chắc muốn nộp bài?`)) return;
  submitQuiz(false);
}

async function submitQuiz(autoSubmit) {
  if (appState.quizSubmitted) return;
  appState.quizSubmitted = true;
  clearInterval(appState.timerInt);
  const timeTaken = (appState.questions.length > 0 ? (45*60 - appState.timeLeft) : 0);
  const el = document.getElementById('quiz-content');
  el.innerHTML = '<div class="loading">⏳ Đang nộp bài...</div>';
  try {
    const res = await gasPost({
      action:'submitQuiz',
      maNV: appState.quizMaNV,
      sessionId: appState.currentSession?.['Session ID'],
      answers: appState.quizAnswers,
      timeTaken,
    });
    if (res.ok) renderQuizResult(res, appState.quizMaNV, false);
    else { el.innerHTML = `<div class="alert alert-error">Lỗi nộp bài: ${res.error}</div>`; appState.quizSubmitted=false; }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">Lỗi kết nối khi nộp bài. Vui lòng thử lại ngay.</div>`;
    appState.quizSubmitted = false;
  }
}

function renderQuizResult(r, maNV, alreadyDone) {
  const pass = r.pass || r['Kết quả']==='ĐẠT';
  const correct = r.correct || r['Số câu đúng'] || 0;
  const total = r.total || r['Tổng số câu'] || 30;
  const pct = r.pct || r['Điểm'] || Math.round(correct/total*100);
  let detail = [];
  try { detail = typeof r.detail==='string' ? JSON.parse(r.detail) : (r.detail||[]); } catch{}

  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-wrap">
      <div class="result-card">
        <div class="score-ring ${pass?'pass':'fail'}">
          <div class="score-pct ${pass?'pass':'fail'}">${pct}%</div>
          <div style="font-size:11px;color:var(--gray3);margin-top:2px">${correct}/${total}</div>
        </div>
        <div class="verdict ${pass?'pass':'fail'}">${pass?'✅ ĐẠT':'❌ KHÔNG ĐẠT'}</div>
        <div style="font-size:13px;color:var(--gray3);margin-bottom:16px">${maNV} · Ngưỡng đạt: 25/30 (83%)</div>
        <div class="alert ${pass?'alert-success':'alert-error'}" style="margin-bottom:${pass?'20':'16'}px">
          ${pass ? '🎉 Chúc mừng! Bạn đã hoàn thành bài kiểm tra ATTP. Giơ màn hình này cho QA xác nhận.' 
                 : '📚 Chưa đạt. Giơ màn hình cho QA — QA sẽ phê duyệt nếu bạn muốn làm lại.'}
        </div>
        ${alreadyDone?'<div class="alert alert-warning" style="margin-bottom:16px">Bạn đã nộp bài trước đó.</div>':''}
        ${detail.length ? `
        <div class="breakdown">
          <div style="font-size:11px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Chi tiết từng câu</div>
          ${detail.map((d,i)=>{
            const q = appState.questions[i] || {};
            const chosenTxt = d.chosen>=0 ? LETTERS[d.chosen]+(q.options?'. '+q.options[d.chosen]:'') : 'Chưa trả lời';
            const correctTxt = LETTERS[d.correct]+(q.options?'. '+q.options[d.correct]:'');
            return `<div class="b-row">
              <span style="font-size:18px;flex-shrink:0">${d.isCorrect?'✅':'❌'}</span>
              <div><div style="font-size:13px;color:var(--text)">${q.text||'Câu '+(i+1)}</div>
              <div style="font-size:12px;color:${d.isCorrect?'var(--green)':'var(--red)'}">
                Bạn chọn: ${chosenTxt}${!d.isCorrect?' · Đáp án đúng: '+correctTxt:''}</div></div>
            </div>`;
          }).join('')}
        </div>` : ''}
        <button class="btn btn-ghost" style="width:100%;margin-top:16px" onclick="renderQuizEntry()">← NV tiếp theo</button>
      </div>
    </div>`;
}

function filterDashTable() {
  const search = document.getElementById('dash-search').value.toLowerCase();
  const store = document.getElementById('dash-filter-store').value;
  const result = document.getElementById('dash-filter-result').value;
  const location = document.getElementById('dash-filter-location').value;
  const rows = document.querySelectorAll('#dash-tbody tr');
  rows.forEach(row => {
    const cells = row.querySelectorAll('td');
    if (!cells.length) return;
    const maNV = cells[0]?.textContent.toLowerCase();
    const hoTen = cells[1]?.textContent.toLowerCase();
    const rowStore = cells[2]?.textContent;
    const rowLoc = cells[3]?.textContent;
    const rowResult = cells[5]?.textContent;
    const matchSearch = !search || maNV.includes(search) || hoTen.includes(search);
    const matchStore = !store || rowStore.includes(store);
    const matchLoc = !location || rowLoc.includes(location);
    const matchResult = !result || (result==='notest' ? rowResult.includes('Chưa') : rowResult.includes(result));
    row.style.display = (matchSearch && matchStore && matchLoc && matchResult) ? '' : 'none';
  });
}

function doRandomCall() {
  const nvData = appState.dashboardData?.nvData || [];
  const checkedIn = nvData.filter(nv => nv.checkinTime);
  if (!checkedIn.length) { showToast('Chưa có NV checkin','error'); return; }

  // Pool chống trùng
  if (appState.randomCallPool.length < 10) {
    appState.randomCallPool = [...checkedIn].sort(()=>Math.random()-.5);
    document.getElementById('random-remaining').textContent = '↺ Pool đã được reset';
  }
  const picked = appState.randomCallPool.splice(0,10);
  document.getElementById('random-list').innerHTML = picked.map((nv,i)=>`<span style="margin-right:12px">${i+1}. ${nv.hoTen} <span style="font-size:11px;opacity:.7">(${nv.maNV})</span></span>`).join('<br>');
  const rem = appState.randomCallPool.length;
  document.getElementById('random-remaining').textContent = `Còn ${rem} NV trong pool`;
}

function resetRandomPool() {
  appState.randomCallPool = [];
  const nvData = appState.dashboardData?.nvData || [];
  appState.randomCallPool = [...nvData.filter(nv=>nv.checkinTime)].sort(()=>Math.random()-.5);
  document.getElementById('random-list').textContent = 'Pool đã reset. Nhấn Random 10 để bắt đầu.';

}

function generateExcelAndPDF(data) {
  // Tạo CSV (Excel-compatible)
  const {session, nvList, results} = data;
  const resultMap = {};
  results.forEach(r => resultMap[r['Mã NV']?.toUpperCase()] = r);

  const csvRows = [
    ['BÁO CÁO KẾT QUẢ TRAINING ATTP'],
    ['Phiên:', session['Tên đợt']||''],
    ['Ngày:', session['Ngày']||''],
    [],
    ['Mã NV','Họ tên','Dept','Store','Location','Giờ checkin','Số lần làm','Điểm (%)','Kết quả'],
    ...(nvList||[]).map(nv => {
      const r = resultMap[nv['Mã NV']?.toUpperCase()];
      return [nv['Mã NV'],nv['Họ tên'],nv['Dept'],nv['Store'],nv['Location'],nv['Thời gian check-in'],nv['Lần làm thứ']||0,r?r['Điểm']:'',r?r['Kết quả']:'Chưa làm'];
    }),
    [],
    ['TỔNG KẾT','','','','','','','',`ĐẠT: ${results.filter(r=>r['Kết quả']==='ĐẠT').length}/${results.length}`],
  ];

  const csv = csvRows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'BaoCao_ATTP_'+( session['Ngày']||'').replace(/\//g,'-')+'.csv';
  a.click();

  // PDF via print
  const printWin = window.open('','_blank');
  printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Báo cáo ATTP</title>
    <style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px}
    h1{font-size:18px;color:#1a2e4a;margin-bottom:4px}
    h2{font-size:13px;color:#555;font-weight:normal;margin-bottom:20px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th{background:#1a2e4a;color:#fff;padding:8px;text-align:left;font-size:11px}
    td{padding:7px 8px;border-bottom:1px solid #eee;font-size:11px}
    .pass{color:#1a7a46;font-weight:bold}.fail{color:#c0392b;font-weight:bold}
    .summary{margin-top:20px;padding:12px;background:#f0f8f0;border-left:4px solid #1a7a46;border-radius:4px}
    @media print{button{display:none}}</style></head><body>
    <h1>BÁO CÁO KẾT QUẢ TRAINING ATTP</h1>
    <h2>${session['Tên đợt']||''} &nbsp;|&nbsp; Ngày: ${session['Ngày']||''}</h2>
    <table><thead><tr><th>STT</th><th>Mã NV</th><th>Họ tên</th><th>Store</th><th>Location</th><th>Điểm (%)</th><th>Kết quả</th></tr></thead>
    <tbody>${(nvList||[]).map((nv,i)=>{
      const r = resultMap[nv['Mã NV']?.toUpperCase()];
      return '<tr><td>'+(i+1)+'</td><td>'+nv['Mã NV']+'</td><td>'+nv['Họ tên']+'</td><td>'+nv['Store']+'</td><td>'+nv['Location']+'</td><td>'+(r?r['Điểm']:'—')+'</td><td class="'+(r?r['Kết quả']==='ĐẠT'?'pass':'fail':'')+'">'+( r?r['Kết quả']:'Chưa làm')+'</td></tr>';
    }).join('')}</tbody></table>
    <div class="summary"><strong>Tổng kết:</strong> ${results.filter(r=>r['Kết quả']==='ĐẠT').length} đạt / ${results.length} nộp bài / ${nvList?.length||0} tổng đăng ký</div>
    <br><button onclick="window.print()">🖨 In PDF</button>
    </body></html>`);
  printWin.document.close();
  showToast('✅ Đã tạo CSV và mở cửa sổ PDF');
}

// Import NV
let _nvImportRows = [];
function previewImportNV(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
    _nvImportRows = [];
    lines.forEach(line => {
      const parts = line.split(/,|\t/).map(p=>p.replace(/^"|"$/g,'').trim());
      if (parts.length >= 2 && parts[0] && !/mã nv|họ tên|hoTen|maNV|stt/i.test(parts[0])) {
        _nvImportRows.push({maNV:parts[0].toUpperCase(), hoTen:parts[1]||'', dept:parts[2]||'', store:parts[3]||''});
      }
    });
    document.getElementById('import-nv-preview').textContent = `→ Đọc được ${_nvImportRows.length} NV. Nhấn "Thêm" hoặc "Thay thế" để import.`;
  };
  reader.readAsText(file,'utf-8');
}
async function doImportNV(mode) {
  if (!_nvImportRows.length) { showToast('Chưa chọn file hoặc file trống','error'); return; }
  if (mode==='replace' && !confirm(`Xác nhận XÓA toàn bộ và thay bằng ${_nvImportRows.length} NV từ file?`)) return;
  try {
    const res = await gasPost({action:'importNV', password:appState.qaPassword, rows:_nvImportRows, sessionId:appState.currentSession?.['Session ID'], mode});
    if (res.ok) { showToast(`✅ Đã import ${res.added} NV (bỏ qua ${res.skipped} trùng)`); renderAdmin(); }
    else showToast(res.error,'error');
  } catch { showToast('Lỗi kết nối','error'); }
}

// Import câu hỏi
let _qImportRows = [];
function previewImportQ(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
    _qImportRows = [];
    lines.forEach(line => {
      const parts = line.split(/,|\t/).map(p=>p.replace(/^"|"$/g,'').trim());
      if (parts.length >= 6 && parts[1] && !/nội dung|content/i.test(parts[1])) {
        _qImportRows.push({id:parts[0], text:parts[1], a:parts[2], b:parts[3], c:parts[4], d:parts[5], correct:parseInt(parts[6])||0});
      }
    });
    document.getElementById('import-q-preview').textContent = `→ Đọc được ${_qImportRows.length} câu hỏi.`;
  };
  reader.readAsText(file,'utf-8');
}
async function doImportQ(mode) {
  if (!_qImportRows.length) { showToast('Chưa chọn file','error'); return; }
  if (mode==='replace' && !confirm(`Thay thế toàn bộ ngân hàng câu hỏi bằng ${_qImportRows.length} câu mới?`)) return;
  try {
    const res = await gasPost({action:'importQuestions', password:appState.qaPassword, rows:_qImportRows, mode});
    if (res.ok) { showToast(`✅ Đã import ${res.added} câu hỏi`); renderAdmin(); }
    else showToast(res.error,'error');
  } catch { showToast('Lỗi kết nối','error'); }
}

async function loadSessions() {
  try {
    const res = await gasGet({action:'getSessions'});
    if (!res.ok) return;
    const opts = res.sessions.map(s=>`<option value="${s['Session ID']}">${s['Tên đợt']} (${s['Ngày']})</option>`).join('');
    const sel = document.createElement('select');
    sel.innerHTML = opts;
    sel.style.cssText='padding:8px;border:1.5px solid var(--gray2);border-radius:8px;font-size:13px;margin-top:8px;width:100%';
    sel.onchange = () => {
      const s = res.sessions.find(x=>x['Session ID']===sel.value);
      if (s) { appState.currentSession=s; renderAdmin(); showToast('✅ Đã chuyển sang phiên: '+s['Tên đợt']); }
    };
    const card = document.querySelector('#admin-content .admin-section .card-body');
    if (card) card.appendChild(sel);
  } catch { showToast('Lỗi tải phiên','error'); }
}

async function submitCreateSession() {
  const name = document.getElementById('ns-name').value.trim();
  const date = document.getElementById('ns-date').value.trim();
  const start = document.getElementById('ns-start').value.trim();
  if (!name||!date) { showToast('Vui lòng nhập đủ thông tin','error'); return; }
  try {
    const res = await gasPost({action:'createSession', password:appState.qaPassword, name, date, startTime:start});
    if (res.ok) {
      appState.currentSession = {['Session ID']:res.sessionId,'Tên đợt':name,'Ngày':date};
      closeModal('modal-create-session');
      showToast('✅ Đã tạo phiên mới: '+name);
      renderAdmin();
    } else showToast(res.error,'error');
  } catch { showToast('Lỗi kết nối','error'); }
}

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function showError(id, msg) {
  const el=document.getElementById(id); if(!el) return;
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none',5000);
}
function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════
async function boot() {
  // Sync offline queue nếu có
  if (appState.offlineQueue.length && navigator.onLine) syncOfflineQueue();

  // Lấy session hiện tại
  try {
    if (GAS_URL !== 'AKfycbzyAhaaHb-8BKA_u51hF4zmFkv7488yiq3N4KV8-fnOFQaFJFCUFWkiLM18zgEw70B0hw') {
      const res = await gasGet({action:'getSession'});
      if (res.ok && res.session) {
        appState.currentSession = res.session;
        const status = await gasGet({action:'getQuizStatus', sessionId:res.session['Session ID']});
        if (status.ok) appState.sessionStatus = {checkinOpen:status.checkinOpen, quizOpen:status.quizOpen};
      }
    }
  } catch {}
  renderCheckin();
}
boot();
</script>
